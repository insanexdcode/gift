<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUTE REMINDERS</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #e166e6;
            font-family: Arial, sans-serif;
        }
        .book-cover {
            width: 300px;
            height: 400px;
            background: rgb(236, 179, 214);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }
        .heart {
            font-size: 60px;
            color: red;
            position: absolute;
            top: -50px;
            animation: heartbeat 1.5s infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .button {
            margin-top: 20px;
            padding: 10px 20px;
            background: rgb(247, 0, 255);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="book-cover">
        <div class="heart">❤️</div> <!-- Dhadakta hua dil -->
        <h1 id="book-title">CUTE REMINDERS</h1>
        <p id="page-content">From Your Bestfriend</p>
        <br>OPEN UP<br>
    </div>
    <button class="button" onclick="nextPage()">Next Page</button>

    <script>
        let pages = ["page1.html", "page2.html", "page3.html", "page4.html", "page5.html"];
        let currentPage = 0;
        
        function nextPage() {
            currentPage++;
            if (currentPage >= pages.length) {
                currentPage = 0; // Loop back to first page
            }
            window.location.href = pages[currentPage];
        }
    </script>
</body>
</html>
